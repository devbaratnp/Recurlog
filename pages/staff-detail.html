<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Staff Detail - Recurlog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <script src="../assets/js/sidebar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#1DB954', navy: '#0B1E3D', amber: '#F59E0B', danger: '#EF4444' },
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">
  <script>injectSidebar();</script>

  <div class="page-content">
    <header class="page-header">
      <div class="page-header-inner">
        <div class="flex items-center gap-2">
          <button onclick="toggleSidebar()" class="sidebar-toggle-btn" aria-label="Toggle menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <a href="staff.html" class="p-2 -ml-1 text-gray-400 hover:text-navy transition-colors rounded-lg hover:bg-gray-100"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
          <h1 id="staff-name-header" class="page-title">Staff Detail</h1>
        </div>
      </div>
    </header>

    <div class="p-4 sm:p-6 space-y-6">
      <div id="staff-profile" class="card p-6 fade-in"></div>

      <div class="card overflow-hidden fade-in">
        <div class="card-header">
          <h2 class="font-semibold text-navy text-base flex items-center gap-2"><i data-lucide="clipboard-list" class="w-5 h-5 text-brand"></i> Assigned Tasks</h2>
        </div>
        <div class="p-0">
          <table class="data-table">
            <thead>
              <tr>
                <th>Task Title</th>
                <th>Customer</th>
                <th>Scheduled Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="staff-tasks-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav md:hidden">
    <a href="dashboard.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Dashboard</span>
    </a>
    <a href="customers.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="users" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Customers</span>
    </a>
    <a href="tasks.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="clipboard-list" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Tasks</span>
    </a>
    <a href="reports.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Reports</span>
    </a>
    <button onclick="window.location.href='settings.html'" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="more-horizontal" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">More</span>
    </button>
  </nav>

  <script>
    function renderStaffDetail() {
      var staffId = localStorage.getItem('fscrm_currentStaffId');
      if (!staffId) { window.navigateTo('staff.html'); return; }

      var staff = window.getStaffMember(staffId);
      if (!staff) { window.navigateTo('staff.html'); return; }

      var stats = window.getStaffStats(staffId);
      document.getElementById('staff-name-header').textContent = staff.name;

      document.getElementById('staff-profile').innerHTML =
        '<div class="flex flex-col sm:flex-row items-center sm:items-start gap-5">' +
          '<img src="' + staff.avatar + '" alt="' + staff.name + '" class="w-20 h-20 rounded-full object-cover border-2 border-gray-100">' +
          '<div class="text-center sm:text-left flex-1">' +
            '<h2 class="text-lg font-bold text-navy">' + staff.name + '</h2>' +
            '<p class="text-sm text-gray-500">' + (staff.phone || '') + '</p>' +
            '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4">' +
              '<div class="bg-gray-50 rounded-lg p-3 text-center"><p class="text-xs text-gray-500">Total Tasks</p><p class="text-lg font-bold text-navy">' + stats.total + '</p></div>' +
              '<div class="bg-gray-50 rounded-lg p-3 text-center"><p class="text-xs text-gray-500">Completed</p><p class="text-lg font-bold text-brand">' + stats.completed + '</p></div>' +
              '<div class="bg-gray-50 rounded-lg p-3 text-center"><p class="text-xs text-gray-500">Missed</p><p class="text-lg font-bold text-danger">' + stats.missed + '</p></div>' +
              '<div class="bg-gray-50 rounded-lg p-3 text-center"><p class="text-xs text-gray-500">Rate</p><p class="text-lg font-bold text-navy">' + stats.completionRate + '%</p></div>' +
            '</div>' +
          '</div>' +
        '</div>';

      var tasks = window.getTasks({ staffId: staffId });
      var customers = window.getCustomers();
      var tbody = document.getElementById('staff-tasks-body');
      tbody.innerHTML = tasks.map(function(t) {
        var customer = customers.find(function(c) { return String(c.id) === String(t.customerId); });
        var customerName = customer ? customer.name : 'Unknown';
        return '<tr>' +
          '<td data-label="Task Title" class="font-medium text-navy">' + t.title + '</td>' +
          '<td data-label="Customer" class="text-gray-600">' + customerName + '</td>' +
          '<td data-label="Date" class="text-gray-600">' + window.formatDate(t.scheduledDate) + '</td>' +
          '<td data-label="Status">' + window.renderStatusPill(t.status) + '</td>' +
        '</tr>';
      }).join('');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    document.addEventListener('DOMContentLoaded', renderStaffDetail);
  </script>
  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
