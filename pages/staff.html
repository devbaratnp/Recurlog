<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Staff - Recurlog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <script src="../assets/js/sidebar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#1DB954', navy: '#0B1E3D', amber: '#F59E0B', danger: '#EF4444' },
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">
  <script>injectSidebar();</script>

  <div class="page-content">
    <header class="page-header">
      <div class="page-header-inner">
        <div class="flex items-center gap-2">
          <button onclick="toggleSidebar()" class="sidebar-toggle-btn" aria-label="Toggle menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <h1 class="page-title">Staff</h1>
        </div>
        <button onclick="window.showToast('Staff management is coming soon (admin-only feature).', 'info')" class="btn btn-sm btn-primary">
          <i data-lucide="plus" class="w-4 h-4"></i> Add Staff
        </button>
      </div>
    </header>

    <div class="p-4 sm:p-6">
      <div id="staff-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
    </div>
  </div>

  <nav class="bottom-nav md:hidden">
    <a href="dashboard.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Dashboard</span>
    </a>
    <a href="customers.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="users" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Customers</span>
    </a>
    <a href="tasks.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="clipboard-list" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Tasks</span>
    </a>
    <a href="reports.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Reports</span>
    </a>
    <button onclick="window.location.href='settings.html'" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="more-horizontal" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">More</span>
    </button>
  </nav>

  <script>
    function renderStaff() {
      var staff = window.getStaffWithStats();
      var grid = document.getElementById('staff-grid');
      grid.innerHTML = staff.map(function(s) {
        var rate = s.completionRate || 0;
        return '<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 hover:shadow-md transition-all fade-in">' +
          '<div class="flex items-center gap-4 mb-4">' +
            '<img src="' + s.avatar + '" alt="' + s.name + '" class="w-14 h-14 rounded-full object-cover border-2 border-gray-100">' +
            '<div class="flex-1 min-w-0">' +
              '<h3 class="font-semibold text-navy text-base truncate">' + s.name + '</h3>' +
              '<p class="text-sm text-gray-500 truncate">' + (s.phone || '') + '</p>' +
            '</div>' +
          '</div>' +
          '<div class="flex items-center gap-4 mb-3 text-sm">' +
            '<div class="flex items-center gap-1.5 text-gray-500"><i data-lucide="clipboard-list" class="w-4 h-4"></i> <span class="font-medium text-navy">' + s.activeTasks + '</span> Active</div>' +
            '<div class="flex items-center gap-1.5 text-gray-500"><i data-lucide="check-circle" class="w-4 h-4 text-brand"></i> <span class="font-medium text-navy">' + rate + '%</span></div>' +
          '</div>' +
          '<div class="w-full bg-gray-100 rounded-full h-2 mb-4">' +
            '<div class="bg-brand h-2 rounded-full transition-all" style="width:' + rate + '%"></div>' +
          '</div>' +
          '<a href="javascript:void(0)" onclick="window.goToStaff(' + s.id + ')" class="inline-flex items-center gap-1.5 text-sm font-medium text-brand hover:text-brand/80 transition-colors">View Profile <i data-lucide="chevron-right" class="w-4 h-4"></i></a>' +
        '</div>';
      }).join('');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderStaff();
    });
  </script>
  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
