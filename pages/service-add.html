<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Add Service - ServCRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <script src="../assets/js/sidebar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#1DB954',
            navy: '#0B1E3D',
            amber: '#F59E0B',
            danger: '#EF4444'
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
<script>injectSidebar();</script>

  <div class="page-content">
    <header class="page-header">
      <div class="page-header-inner">
        <div class="flex items-center gap-2">
          <button onclick="toggleSidebar()" class="sidebar-toggle-btn" aria-label="Toggle menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <a href="customer-detail.html" class="p-2 -ml-1 text-gray-400 hover:text-navy transition-colors rounded-lg hover:bg-gray-100">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
          </a>
          <h1 class="page-title">Add Service</h1>
        </div>
      </div>
    </header>

    <div class="p-4 md:p-6 lg:p-8 max-w-3xl mx-auto">

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-5 md:p-7 space-y-6">
          <!-- Customer Dropdown -->
          <div>
            <label for="service-customer" class="block text-sm font-semibold text-gray-700 mb-1.5">Customer</label>
            <select id="service-customer" class="form-select"></select>
          </div>

          <!-- Service For -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Service For</label>
            <div id="service-for-chips" class="flex flex-wrap gap-2"></div>
          </div>

          <!-- Problem / Issue Description -->
          <div>
            <label for="service-problem" class="block text-sm font-semibold text-gray-700 mb-1.5">Problem / Issue Description</label>
            <textarea id="service-problem" rows="3" class="form-textarea" placeholder="Describe the customer's problem or issue in detail..."></textarea>
          </div>

          <!-- Category -->
          <div>
            <label for="service-category" class="block text-sm font-semibold text-gray-700 mb-1.5">Category</label>
            <select id="service-category" class="form-select"></select>
          </div>

          <!-- Service Type Toggle -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Service Type</label>
            <div class="flex rounded-lg border border-gray-300 overflow-hidden w-fit">
              <button type="button" id="service-type-onetime" data-value="onetime" class="px-5 py-2 text-sm font-medium transition-colors">One Time</button>
              <button type="button" id="service-type-recurring" data-value="recurring" class="px-5 py-2 text-sm font-medium transition-colors bg-brand text-white">Recurring</button>
            </div>
          </div>

          <!-- Recurrence Section -->
          <div id="recurrence-section" class="space-y-4 p-4 bg-gray-50 rounded-lg border border-gray-200">
            <div class="flex items-center gap-2">
              <i data-lucide="repeat" class="w-4 h-4 text-brand"></i>
              <span class="text-sm font-semibold text-gray-700">Recurrence Settings</span>
            </div>

            <div class="flex items-center gap-3">
              <label for="rec-value" class="text-sm text-gray-600 whitespace-nowrap">Repeat Every</label>
              <input type="number" id="rec-value" value="1" min="1" class="form-input w-20 text-center">
              <select id="rec-unit" class="form-select w-auto">
                <option value="days">Days</option>
                <option value="weeks">Weeks</option>
                <option value="months">Months</option>
                <option value="years">Years</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Repeat From</label>
              <div class="flex gap-4">
                <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                  <input type="radio" name="rec-repeat" id="rec-repeat-lastdone" value="last-done" checked class="accent-brand">
                  Last Done Date
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                  <input type="radio" name="rec-repeat" id="rec-repeat-fixed" value="fixed-schedule" class="accent-brand">
                  Fixed Schedule
                </label>
              </div>
            </div>

            <div id="rec-preview" class="text-sm text-gray-500 italic bg-white px-3 py-2.5 rounded-lg border border-gray-200">
              This service will repeat every 1 day(s) from the Last Done Date
            </div>
          </div>

          <!-- First Scheduled Date -->
          <div>
            <label for="service-first-date" class="block text-sm font-semibold text-gray-700 mb-1.5">First Scheduled Date</label>
            <input type="date" id="service-first-date" class="form-input max-w-xs">
          </div>

          <!-- Assign To -->
          <div>
            <label for="service-staff" class="block text-sm font-semibold text-gray-700 mb-1.5">Assign To</label>
            <select id="service-staff" class="form-select max-w-xs"></select>
          </div>

          <!-- Notes -->
          <div>
            <label for="service-notes" class="block text-sm font-semibold text-gray-700 mb-1.5">Notes</label>
            <textarea id="service-notes" rows="4" class="form-textarea" placeholder="Any additional notes..."></textarea>
          </div>

          <!-- Save Button -->
          <div class="pt-2">
            <button id="btn-save-service" class="btn btn-md btn-primary brand-glow">
              <i data-lucide="save" class="w-4 h-4"></i>Save Service
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav md:hidden">
    <a href="dashboard.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Dashboard</span>
    </a>
    <a href="customers.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg min-w-0 flex-1 active">
      <i data-lucide="users" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Customers</span>
    </a>
    <a href="tasks.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="clipboard-list" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Tasks</span>
    </a>
    <a href="reports.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Reports</span>
    </a>
    <button onclick="window.location.href='settings.html'" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="more-horizontal" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">More</span>
    </button>
  </nav>

  <script>
    // ========== PAGE INIT ==========
    document.addEventListener('DOMContentLoaded', function () {
      initServiceForChips();
      populateCustomers();
      populateCategories();
      populateStaff();
      setDefaultDate();
      initServiceTypeToggle();
      initRecurrenceListeners();
      updateRecurrencePreview();

      document.getElementById('btn-save-service').addEventListener('click', handleSave);

      // Manually highlight Customers in sidebar since this page is accessed via customer detail
      document.querySelectorAll('.sidebar-nav a').forEach(function (link) {
        var href = link.getAttribute('href');
        if (href && (href === 'customers.html' || href.indexOf('customer') > -1)) {
          link.classList.add('bg-brand/10', 'text-brand');
          link.classList.remove('text-white/70', 'hover:text-white');
        }
      });
    });

    // ========== SERVICE FOR CHIPS (dynamic) ==========
    var selectedServiceFor = null;

    function initServiceForChips() {
      var container = document.getElementById('service-for-chips');
      var types = window.getServiceTypes();
      types.forEach(function (item) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = item;
        btn.dataset.value = item;
        btn.className = 'px-4 py-2 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700 hover:border-brand hover:text-brand transition-colors';
        btn.addEventListener('click', function () {
          container.querySelectorAll('button').forEach(function (b) {
            b.className = 'px-4 py-2 rounded-full text-sm font-medium border border-gray-300 bg-white text-gray-700 hover:border-brand hover:text-brand transition-colors';
          });
          btn.className = 'px-4 py-2 rounded-full text-sm font-medium border border-brand bg-brand text-white transition-colors';
          selectedServiceFor = item;
        });
        container.appendChild(btn);
      });
    }

    // ========== CUSTOMER DROPDOWN ==========
    function populateCustomers() {
      var select = document.getElementById('service-customer');
      var customers = window.getCustomers();

      var addNew = document.createElement('option');
      addNew.value = '__add_new__';
      addNew.textContent = '+ Add New Customer';
      select.appendChild(addNew);

      customers.forEach(function (c) {
        var opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        select.appendChild(opt);
      });

      select.addEventListener('change', function () {
        if (this.value === '__add_new__') {
          window.location.href = 'customer-add.html';
        }
      });
    }

    // ========== CATEGORY DROPDOWN ==========
    function populateCategories() {
      var select = document.getElementById('service-category');
      var cats = window.getCategories();
      cats.forEach(function (c) {
        var opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        select.appendChild(opt);
      });
    }

    // ========== STAFF DROPDOWN ==========
    function populateStaff() {
      var select = document.getElementById('service-staff');
      var staff = window.getStaff();
      staff.forEach(function (s) {
        var opt = document.createElement('option');
        opt.value = s.id;
        opt.innerHTML = s.name;
        opt.dataset.avatar = s.avatar;
        select.appendChild(opt);
      });
    }

    // ========== DEFAULT DATE ==========
    function setDefaultDate() {
      var today = new Date();
      var y = today.getFullYear();
      var m = String(today.getMonth() + 1).padStart(2, '0');
      var d = String(today.getDate()).padStart(2, '0');
      document.getElementById('service-first-date').value = y + '-' + m + '-' + d;
    }

    // ========== SERVICE TYPE TOGGLE ==========
    function initServiceTypeToggle() {
      var onetimeBtn = document.getElementById('service-type-onetime');
      var recurringBtn = document.getElementById('service-type-recurring');
      var section = document.getElementById('recurrence-section');

      function setActive(active) {
        [onetimeBtn, recurringBtn].forEach(function (btn) {
          btn.className = 'px-5 py-2 text-sm font-medium transition-colors';
        });
        if (active === 'recurring') {
          recurringBtn.classList.add('bg-brand', 'text-white');
          onetimeBtn.classList.add('bg-gray-100', 'text-gray-600');
          section.style.display = 'block';
        } else {
          onetimeBtn.classList.add('bg-brand', 'text-white');
          recurringBtn.classList.add('bg-gray-100', 'text-gray-600');
          section.style.display = 'none';
        }
      }

      onetimeBtn.addEventListener('click', function () { setActive('onetime'); });
      recurringBtn.addEventListener('click', function () { setActive('recurring'); });

      // Default: Recurring
      setActive('recurring');
    }

    // ========== RECURRENCE PREVIEW ==========
    function initRecurrenceListeners() {
      document.getElementById('rec-value').addEventListener('input', updateRecurrencePreview);
      document.getElementById('rec-unit').addEventListener('change', updateRecurrencePreview);
      document.querySelectorAll('input[name="rec-repeat"]').forEach(function (el) {
        el.addEventListener('change', updateRecurrencePreview);
      });
    }

    function updateRecurrencePreview() {
      var val = document.getElementById('rec-value').value || '1';
      var unit = document.getElementById('rec-unit').value;
      var repeatEl = document.querySelector('input[name="rec-repeat"]:checked');
      var repeatFrom = repeatEl ? repeatEl.id.replace('rec-repeat-', '').replace('-', ' ') : 'Last Done Date';
      var unitLabel = unit;
      if (parseInt(val, 10) !== 1) {
        if (unit === 'day') unitLabel = 'days';
        else if (unit === 'week') unitLabel = 'weeks';
        else if (unit === 'month') unitLabel = 'months';
        else if (unit === 'year') unitLabel = 'years';
      }
      var preview = document.getElementById('rec-preview');
      preview.textContent = 'This service will repeat every ' + val + ' ' + unitLabel + ' from the ' + repeatFrom;
    }

    // ========== SAVE SERVICE ==========
    function handleSave() {
      var customerId = document.getElementById('service-customer').value;
      var categoryId = document.getElementById('service-category').value;
      var firstDate = document.getElementById('service-first-date').value;
      var staffId = document.getElementById('service-staff').value;
      var notes = document.getElementById('service-notes').value;
      var problem = document.getElementById('service-problem').value.trim();

      if (!customerId || customerId === '__add_new__') {
        window.showToast('Please select a customer', 'error');
        return;
      }
      if (!selectedServiceFor) {
        window.showToast('Please select a service type (RO, TV, etc.)', 'error');
        return;
      }
      if (!categoryId) {
        window.showToast('Please select a category', 'error');
        return;
      }
      if (!firstDate) {
        window.showToast('Please select a first scheduled date', 'error');
        return;
      }
      if (!staffId) {
        window.showToast('Please assign a staff member', 'error');
        return;
      }

      var isRecurring = document.getElementById('recurrence-section').style.display !== 'none';

      var cat = window.getCategory(parseInt(categoryId, 10));
      var title = (cat ? cat.name : 'Service') + ' - ' + selectedServiceFor;

      var serviceData = {
        customerId: parseInt(customerId, 10),
        categoryId: parseInt(categoryId, 10),
        serviceFor: selectedServiceFor,
        title: title,
        problem: problem,
        isRecurring: isRecurring,
        firstScheduledDate: firstDate,
        assignedTo: parseInt(staffId, 10),
        notes: notes
      };

      if (isRecurring) {
        var recVal = parseInt(document.getElementById('rec-value').value, 10) || 1;
        var recUnit = document.getElementById('rec-unit').value;
        var repeatEl = document.querySelector('input[name="rec-repeat"]:checked');
        var repeatFrom = repeatEl ? repeatEl.value : 'last-done';
        serviceData.recurrence = {
          value: recVal,
          unit: recUnit,
          repeatFrom: repeatFrom
        };
      } else {
        serviceData.recurrence = null;
      }

      var saved = window.saveService(serviceData);
      if (saved) {
        window.showToast('Service added successfully!', 'success');
        setTimeout(function () {
          window.location.href = 'customer-detail.html';
        }, 300);
      } else {
        window.showToast('Failed to save service', 'error');
      }
    }
  </script>

  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
