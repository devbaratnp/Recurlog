<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Customer Report - Recurlog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <script src="../assets/js/sidebar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#1DB954', navy: '#0B1E3D', amber: '#F59E0B', danger: '#EF4444' },
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    @media print {
      .sidebar, .sidebar-backdrop, .page-header, .bottom-nav, .no-print { display: none !important; }
      .page-content { margin: 0 !important; }
      body { background: #fff !important; }
      .report-sheet { box-shadow: none !important; border: none !important; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
<script>injectSidebar();</script>

  <div class="page-content">
    <header class="page-header no-print">
      <div class="page-header-inner">
        <div class="flex items-center gap-2">
          <button onclick="toggleSidebar()" class="sidebar-toggle-btn" aria-label="Toggle menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <a href="customer-detail.html" class="p-2 -ml-1 text-gray-400 hover:text-navy transition-colors rounded-lg hover:bg-gray-100">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
          </a>
          <h1 class="page-title">Customer Report</h1>
        </div>
        <button onclick="window.print()" class="btn btn-sm btn-primary">
          <i data-lucide="printer" class="w-4 h-4"></i> Print
        </button>
      </div>
    </header>

    <div class="p-4 md:p-6 max-w-3xl mx-auto">
      <div class="card p-6 sm:p-8 report-sheet">
        <h2 class="text-xl font-bold text-navy mb-4">Customer Report</h2>

        <div class="mb-6">
          <p id="rep-name" class="text-lg font-semibold text-gray-900">—</p>
          <p id="rep-area" class="text-gray-600">—</p>
          <p id="rep-phone" class="text-gray-600">—</p>
        </div>

        <table class="w-full text-sm">
          <tbody id="rep-rows"></tbody>
        </table>

        <div id="rep-empty" class="hidden text-center text-gray-400 py-10">
          <p>No completed work recorded yet for this customer.</p>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav md:hidden no-print">
    <a href="dashboard.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Dashboard</span>
    </a>
    <a href="customers.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg min-w-0 flex-1 active">
      <i data-lucide="users" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Customers</span>
    </a>
    <a href="orders.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="clipboard-list" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Orders</span>
    </a>
    <a href="reports.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Reports</span>
    </a>
    <button onclick="window.location.href='settings.html'" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="more-horizontal" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">More</span>
    </button>
  </nav>

  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    lucide.createIcons();

    (function () {
      var customerId = localStorage.getItem('fscrm_currentCustomerId');
      if (!customerId) { window.location.href = 'customers.html'; return; }
      var customer = window.getCustomer(customerId);
      if (!customer) { window.location.href = 'customers.html'; return; }

      document.getElementById('rep-name').textContent = customer.name;
      document.getElementById('rep-area').textContent = customer.area || customer.address || '';
      document.getElementById('rep-phone').textContent = customer.phone || '';

      // Build a chronological history of completed work: tasks + orders.
      var entries = [];

      window.getTasks({ customerId: customer.id }).forEach(function (t) {
        if (t.status !== 'completed') return;
        var date = t.completedDate || t.scheduledDate;
        var desc = t.notes && t.notes.trim() ? t.notes : t.title;
        if (t.completedBy) desc += ' (by ' + t.completedBy + ')';
        entries.push({ date: date, desc: desc });
      });

      window.getOrders({ customerId: customer.id }).forEach(function (o) {
        if (o.status !== 'completed') return;
        var date = o.completedDate || o.scheduledDate || (o.createdAt || '').slice(0, 10);
        var desc = (o.notes && o.notes.trim()) ? o.notes : (o.problem || 'Order completed');
        entries.push({ date: date, desc: desc });
      });

      entries.sort(function (a, b) { return new Date(a.date) - new Date(b.date); });

      var rows = document.getElementById('rep-rows');
      var empty = document.getElementById('rep-empty');

      if (entries.length === 0) {
        empty.classList.remove('hidden');
      } else {
        rows.innerHTML = entries.map(function (e) {
          return '<tr class="border-b border-gray-100 align-top">' +
            '<td class="py-3 pr-4 whitespace-nowrap text-gray-500 font-medium" style="width:120px">' + (e.date ? window.formatDate(e.date) : '—') + '</td>' +
            '<td class="py-3 text-gray-800">' + escapeHtml(e.desc) + '</td>' +
          '</tr>';
        }).join('');
      }

      function escapeHtml(str) {
        if (!str) return '';
        var d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      try { lucide.createIcons(); } catch (e) {}
    })();
  </script>
</body>
</html>
