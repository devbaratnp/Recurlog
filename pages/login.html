<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login - ServCRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#1DB954', navy: '#0B1E3D', amber: '#F59E0B', danger: '#EF4444' },
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex font-sans bg-white">
  <div class="hidden lg:flex lg:w-1/2 bg-navy flex-col justify-between p-12 relative overflow-hidden">
    <div class="absolute inset-0 opacity-[0.04]">
      <div class="absolute top-20 left-20 w-72 h-72 bg-brand rounded-full blur-3xl"></div>
      <div class="absolute bottom-20 right-20 w-96 h-96 bg-brand rounded-full blur-3xl"></div>
    </div>
    <div class="relative z-10">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-11 h-11 bg-brand rounded-xl flex items-center justify-center">
          <i data-lucide="wrench" class="w-6 h-6 text-white"></i>
        </div>
        <span class="text-2xl font-bold text-white tracking-tight">ServCRM</span>
      </div>
      <p class="text-white/50 text-sm font-medium">Field Service Management</p>
    </div>
    <div class="relative z-10">
      <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-white/10 max-w-sm">
        <div class="flex items-center gap-3 mb-4">
          <div class="flex -space-x-2">
            <div class="w-8 h-8 rounded-full border-2 border-navy bg-brand flex items-center justify-center text-xs text-white font-bold">RY</div>
            <div class="w-8 h-8 rounded-full border-2 border-navy bg-amber flex items-center justify-center text-xs text-white font-bold">ST</div>
            <div class="w-8 h-8 rounded-full border-2 border-navy bg-danger flex items-center justify-center text-xs text-white font-bold">BS</div>
          </div>
          <span class="text-white/70 text-sm">Active now</span>
        </div>
        <div class="space-y-3">
          <div class="flex justify-between text-sm">
            <span class="text-white/50">Today's Tasks</span>
            <span class="text-white font-semibold">17</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-white/50">Completed</span>
            <span class="text-brand font-semibold">12</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-white/50">Field Staff</span>
            <span class="text-white font-semibold">5</span>
          </div>
        </div>
      </div>
    </div>
    <div class="relative z-10 text-white/30 text-xs">2025 ServCRM Enterprise</div>
  </div>

  <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
    <div class="w-full max-w-sm">
      <div class="flex lg:hidden items-center gap-3 mb-10 justify-center">
        <div class="w-10 h-10 bg-brand rounded-xl flex items-center justify-center">
          <i data-lucide="wrench" class="w-5 h-5 text-white"></i>
        </div>
        <span class="text-xl font-bold text-navy tracking-tight">ServCRM</span>
      </div>
      <h2 class="text-2xl font-bold text-navy mb-1">Welcome back</h2>
      <p class="text-gray-500 text-sm mb-8">Sign in to your account to continue</p>
      <form id="login-form" class="space-y-5">
        <div>
          <label class="form-label" for="email">Email</label>
          <input id="email" type="email" value="admin@demo.com" class="form-input" />
        </div>
        <div>
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" value="demo123" class="form-input" />
        </div>
        <div class="flex justify-end">
          <a href="#" class="text-sm text-brand hover:underline font-medium">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-lg btn-primary w-full brand-glow">
          Login
        </button>
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
          <div class="relative flex justify-center"><span class="bg-white px-4 text-xs text-gray-400 font-medium uppercase tracking-wider">OR CONTINUE WITH</span></div>
        </div>
        <button type="button" class="w-full flex items-center justify-center gap-3 border border-gray-200 rounded-xl py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-all active:scale-[0.98] min-h-[44px]">
          <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
      </form>
      <p class="text-center text-sm text-gray-400 mt-8">
        Don't have an account? <a href="#" class="text-brand hover:underline font-medium">Contact admin</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      localStorage.setItem('fscrm_auth', 'true');
      window.showToast('Login successful! Redirecting...', 'success');
      setTimeout(function () {
        window.location.href = 'dashboard.html';
      }, 800);
    });
  </script>
  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
