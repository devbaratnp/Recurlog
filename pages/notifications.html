<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Notifications - ServCRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <script src="../assets/js/sidebar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#1DB954', navy: '#0B1E3D', amber: '#F59E0B', danger: '#EF4444' },
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">
  <script>injectSidebar();</script>

  <div class="page-content">
    <header class="page-header">
      <div class="page-header-inner">
        <div class="flex items-center gap-2">
          <button onclick="toggleSidebar()" class="sidebar-toggle-btn" aria-label="Toggle menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <h1 class="page-title">Notifications</h1>
          <span id="notification-badge" class="badge badge-info ml-1">0</span>
        </div>
        <button onclick="handleMarkAllRead()" class="btn btn-sm btn-ghost">
          <i data-lucide="check-check" class="w-4 h-4"></i> Mark All Read
        </button>
      </div>
    </header>

    <div class="p-4 sm:p-6">
      <div id="notifications-list" class="space-y-2"></div>
      <div id="notifications-empty" class="empty-state hidden">
        <i data-lucide="bell-off"></i>
        <p>No notifications yet</p>
      </div>
    </div>
  </div>

  <nav class="bottom-nav md:hidden">
    <a href="dashboard.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Dashboard</span>
    </a>
    <a href="customers.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="users" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Customers</span>
    </a>
    <a href="tasks.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="clipboard-list" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Tasks</span>
    </a>
    <a href="reports.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Reports</span>
    </a>
    <button onclick="window.location.href='settings.html'" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="more-horizontal" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">More</span>
    </button>
  </nav>

  <script>
    function getNotifIcon(type) {
      switch (type) {
        case 'task_completed': return { icon: 'check-circle', color: '#1DB954' };
        case 'task_missed': return { icon: 'alert-circle', color: '#EF4444' };
        case 'service_added': return { icon: 'plus-circle', color: '#0EA5E9' };
        case 'customer_added': return { icon: 'user-plus', color: '#1DB954' };
        default: return { icon: 'info', color: '#6B7280' };
      }
    }

    function renderNotifications() {
      var notifs = window.getNotifications();
      var list = document.getElementById('notifications-list');
      var empty = document.getElementById('notifications-empty');
      var badge = document.getElementById('notification-badge');
      var unread = window.getUnreadCount();

      badge.textContent = unread;
      badge.style.display = unread > 0 ? 'inline' : 'none';

      if (notifs.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      list.innerHTML = notifs.map(function(n) {
        var ico = getNotifIcon(n.type);
        var relativeTime = window.formatRelative(n.createdAt);
        return '<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-start gap-3 hover:shadow-md transition-all ' + (n.isRead ? '' : 'border-l-4 border-l-brand') + '">' +
          '<div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style="background:' + ico.color + '15">' +
            '<i data-lucide="' + ico.icon + '" class="w-5 h-5" style="color:' + ico.color + '"></i>' +
          '</div>' +
          '<div class="flex-1 min-w-0">' +
            '<p class="text-sm text-gray-700 leading-relaxed">' + n.text + '</p>' +
            '<p class="text-xs text-gray-400 mt-1">' + relativeTime + '</p>' +
          '</div>' +
          (!n.isRead ? '<span class="w-2 h-2 rounded-full bg-brand flex-shrink-0 mt-1.5"></span>' : '') +
        '</div>';
      }).join('');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function handleMarkAllRead() {
      window.markAllRead();
      renderNotifications();
      window.showToast('All notifications marked as read.', 'success');
    }

    document.addEventListener('DOMContentLoaded', renderNotifications);
  </script>
  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
