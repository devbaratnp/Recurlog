<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tasks - Recurlog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <script src="../assets/js/sidebar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#1DB954',
            navy: '#0B1E3D',
            amber: '#F59E0B',
            danger: '#EF4444'
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
<script>injectSidebar();</script>

  <div class="page-content">
    <header class="page-header">
      <div class="page-header-inner">
        <div class="flex items-center gap-2">
          <button onclick="toggleSidebar()" class="sidebar-toggle-btn" aria-label="Toggle menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <h1 class="page-title">Tasks</h1>
        </div>
        <a href="service-add.html" class="btn btn-sm btn-primary">
          <i data-lucide="plus" class="w-4 h-4"></i> Add Service
        </a>
      </div>
    </header>

    <div class="p-4 md:p-6 lg:p-8 max-w-4xl mx-auto">

      <!-- Drill-Down Filter Banner -->
      <div id="filter-banner" class="filter-banner" style="display:none">
        <div class="filter-banner-left">
          <a href="dashboard.html" class="flex items-center gap-1.5 text-brand font-medium hover:underline">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
          </a>
          <span class="text-gray-300">|</span>
          <span class="font-medium">Showing:</span>
          <span id="filter-label" class="font-semibold"></span>
        </div>
        <button class="filter-banner-clear" onclick="clearFilter()">
          <i data-lucide="x" class="w-3 h-3"></i> Clear Filter
        </button>
      </div>

      <!-- Tabs (hidden when filter is active) -->
      <div id="task-tabs" class="flex rounded-lg bg-gray-100 p-1 mb-4 w-fit">
        <button class="tab-btn px-5 py-2 text-sm font-medium rounded-md transition-colors" data-tab="today">Today</button>
        <button class="tab-btn px-5 py-2 text-sm font-medium rounded-md transition-colors" data-tab="upcoming">Upcoming</button>
        <button class="tab-btn px-5 py-2 text-sm font-medium rounded-md transition-colors" data-tab="missed">Missed</button>
      </div>

      <!-- Search -->
      <div class="relative mb-4">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
        <input type="text" id="task-search" placeholder="Search tasks..." class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand text-sm bg-white">
      </div>

      <!-- Tasks Container -->
      <div id="tasks-container" class="space-y-3"></div>
    </div>
  </div>

  <script>injectBottomNav();</script>

  <!-- MARK COMPLETE MODAL (hidden by default) -->
  <div id="complete-modal" class="modal-overlay" style="display:none">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-bold text-gray-900">Mark Task Complete</h3>
        <button onclick="closeCompleteModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label for="modal-complete-date" class="block text-sm font-semibold text-gray-700 mb-1.5">Completion Date</label>
          <input type="date" id="modal-complete-date" class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand text-sm">
        </div>
        <div>
          <label for="modal-complete-notes" class="block text-sm font-semibold text-gray-700 mb-1.5">Completion Notes</label>
          <textarea id="modal-complete-notes" rows="3" class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand text-sm resize-y" placeholder="Notes about the completion..."></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeCompleteModal()" class="flex-1 px-4 py-2.5 border border-gray-300 text-gray-700 text-sm font-semibold rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
          <button id="modal-confirm-complete" class="flex-1 px-4 py-2.5 bg-brand text-white text-sm font-semibold rounded-lg hover:bg-brand/90 transition-colors brand-glow">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== STATE ==========
    var currentTab = 'today';
    var pendingCompleteTaskId = null;
    var activeFilter = null;

    // ========== INIT ==========
    document.addEventListener('DOMContentLoaded', function () {
      checkFilter();
      if (!activeFilter) {
        readHash();
        setupTabs();
      }
      setupSearch();
      if (!activeFilter) setupHashChange();
      setupModalConfirm();
      renderTasks();

      // Prefill modal date
      var now = new Date();
      var y = now.getFullYear();
      var m = String(now.getMonth() + 1).padStart(2, '0');
      var d = String(now.getDate()).padStart(2, '0');
      document.getElementById('modal-complete-date').value = y + '-' + m + '-' + d;
    });

    // ========== DRILL-DOWN FILTER ==========
    function checkFilter() {
      try {
        var stored = localStorage.getItem('fscrm_task_filter');
        if (stored) {
          activeFilter = JSON.parse(stored);
          localStorage.removeItem('fscrm_task_filter');
        }
      } catch(e) {}
      if (activeFilter) {
        var banner = document.getElementById('filter-banner');
        banner.style.display = 'flex';
        document.getElementById('filter-label').textContent = activeFilter.label || 'Filtered Tasks';
        document.getElementById('task-tabs').style.display = 'none';
      }
    }

    function clearFilter() {
      activeFilter = null;
      var banner = document.getElementById('filter-banner');
      banner.style.display = 'none';
      document.getElementById('task-tabs').style.display = 'flex';
      readHash();
      setupHashChange();
      renderTasks();
    }

    // ========== HASH ROUTING ==========
    function readHash() {
      var hash = window.location.hash.replace('#', '') || 'today';
      if (['today', 'upcoming', 'missed'].indexOf(hash) < 0) hash = 'today';
      currentTab = hash;
      if (!window.location.hash) {
        window.location.hash = 'today';
      }
    }

    function setupHashChange() {
      window.addEventListener('hashchange', function () {
        readHash();
        updateTabUI();
        renderTasks();
      });
    }

    // ========== TABS ==========
    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var tab = this.dataset.tab;
          window.location.hash = tab;
        });
      });
      updateTabUI();
    }

    function updateTabUI() {
      document.querySelectorAll('.tab-btn').forEach(function (btn) {
        if (btn.dataset.tab === currentTab) {
          btn.className = 'tab-btn px-5 py-2 text-sm font-medium rounded-md transition-colors bg-brand text-white';
        } else {
          btn.className = 'tab-btn px-5 py-2 text-sm font-medium rounded-md transition-colors text-gray-600 hover:text-gray-900';
        }
      });
    }

    // ========== SEARCH ==========
    function setupSearch() {
      var input = document.getElementById('task-search');
      input.addEventListener('input', function () {
        renderTasks();
      });
    }

    // ========== TASK FILTERING ==========
    function getFilteredTasks() {
      var allTasks = window.getTasks();
      var today = window.todayISO();
      var services = window.getServices();
      var customers = window.getCustomers();

      var filtered;

      // Handle drill-down filter
      if (activeFilter) {
        filtered = allTasks;

        // Filter by status
        if (activeFilter.status === 'today') {
          filtered = filtered.filter(function (t) { return t.scheduledDate === today; });
        } else if (activeFilter.status === 'missed') {
          filtered = filtered.filter(function (t) { return t.status === 'missed'; });
        } else if (activeFilter.status === 'completed') {
          filtered = filtered.filter(function (t) { return t.status === 'completed'; });
        }

        // Filter by type (one-time vs recurring)
        if (activeFilter.type === 'one-time') {
          var otServiceIds = services.filter(function(s) { return !s.isRecurring; }).map(function(s) { return s.id; });
          filtered = filtered.filter(function(t) { return t.serviceId && otServiceIds.indexOf(t.serviceId) >= 0; });
        } else if (activeFilter.type === 'recurring') {
          var recServiceIds = services.filter(function(s) { return s.isRecurring; }).map(function(s) { return s.id; });
          filtered = filtered.filter(function(t) { return t.serviceId && recServiceIds.indexOf(t.serviceId) >= 0; });
        }

        // Filter by area
        if (activeFilter.type === 'area' && activeFilter.value) {
          var areaCustomerIds = customers.filter(function(c) { return c.area === activeFilter.value; }).map(function(c) { return c.id; });
          filtered = filtered.filter(function(t) { return areaCustomerIds.indexOf(t.customerId) >= 0; });
        }

        // Filter by staff
        if (activeFilter.type === 'staff' && activeFilter.value) {
          filtered = filtered.filter(function(t) { return String(t.assignedTo) === String(activeFilter.value); });
        }
      } else {
        switch (currentTab) {
          case 'today':
            filtered = allTasks.filter(function (t) { return t.scheduledDate === today; });
            break;
          case 'upcoming':
            filtered = allTasks.filter(function (t) { return t.scheduledDate > today && t.status === 'pending'; });
            break;
          case 'missed':
            filtered = allTasks.filter(function (t) { return t.status === 'missed'; });
            break;
          default:
            filtered = allTasks.filter(function (t) { return t.scheduledDate === today; });
        }
      }

      // Search filter
      var search = document.getElementById('task-search').value.toLowerCase().trim();
      if (search) {
        filtered = filtered.filter(function (t) {
          var customer = window.getCustomer(t.customerId);
          var staff = window.getStaffMember(t.assignedTo);
          var customerName = customer ? customer.name.toLowerCase() : '';
          var staffName = staff ? staff.name.toLowerCase() : '';
          return t.title.toLowerCase().indexOf(search) >= 0 ||
                 customerName.indexOf(search) >= 0 ||
                 staffName.indexOf(search) >= 0;
        });
      }

      // Sort: most recent first
      filtered.sort(function (a, b) {
        return new Date(b.scheduledDate) - new Date(a.scheduledDate);
      });

      return filtered;
    }

    // ========== RENDER ==========
    function renderTasks() {
      var container = document.getElementById('tasks-container');
      var tasks = getFilteredTasks();
      container.innerHTML = '';

      if (tasks.length === 0) {
        container.appendChild(createEmptyState());
        return;
      }

      tasks.forEach(function (task) {
        container.appendChild(createTaskCard(task));
      });

      lucide.createIcons();
    }

    function createEmptyState() {
      var div = document.createElement('div');
      div.className = 'flex flex-col items-center justify-center py-16 text-center';

      var iconMap = {
        today: 'calendar',
        upcoming: 'calendar-plus',
        missed: 'alert-triangle'
      };

      div.innerHTML =
        '<div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mb-4">' +
          '<i data-lucide="' + (iconMap[currentTab] || 'calendar') + '" class="w-8 h-8 text-gray-400"></i>' +
        '</div>' +
        '<h3 class="text-lg font-semibold text-gray-700 mb-1">No ' + currentTab + ' tasks</h3>' +
        '<p class="text-sm text-gray-500 mb-5">' + getEmptyMessage() + '</p>' +
        (currentTab !== 'missed'
          ? '<a href="service-add.html" class="px-5 py-2.5 bg-brand text-white text-sm font-semibold rounded-lg hover:bg-brand/90 transition-colors brand-glow inline-flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> Add Service</a>'
          : '');

      return div;
    }

    function getEmptyMessage() {
      switch (currentTab) {
        case 'today': return 'No tasks scheduled for today. Create a new service to get started.';
        case 'upcoming': return 'No upcoming tasks. Schedule a recurring service to see tasks here.';
        case 'missed': return 'No missed tasks. Great job keeping up!';
        default: return '';
      }
    }

    function createTaskCard(task) {
      var customer = window.getCustomer(task.customerId);
      var staff = window.getStaffMember(task.assignedTo);
      var service = task.serviceId ? window.getService(task.serviceId) : null;
      var problemText = service && service.problem ? service.problem : '';

      var div = document.createElement('div');
      div.className = 'bg-white rounded-xl border border-gray-200 p-4 md:p-5 shadow-sm hover:shadow-md transition-shadow';

      var isPending = task.status === 'pending';

      var problemHtml = problemText ? '<div class="text-xs text-gray-400 mt-1"><span class="font-medium text-gray-500">Problem:</span> ' + escapeHtml(problemText.substring(0, 80)) + (problemText.length > 80 ? '...' : '') + '</div>' : '';

      div.innerHTML =
        '<div class="flex items-start justify-between gap-4">' +
          '<div class="flex-1 min-w-0">' +
            '<h3 class="font-semibold text-gray-900 text-sm md:text-base truncate">' + escapeHtml(task.title) + '</h3>' +
            problemHtml +
            '<div class="flex flex-wrap items-center gap-x-4 gap-y-1.5 mt-2 text-xs text-gray-500">' +
              '<span class="flex items-center gap-1.5"><i data-lucide="user" class="w-3.5 h-3.5"></i> ' + (customer ? escapeHtml(customer.name) : 'Unknown') + '</span>' +
              '<span class="flex items-center gap-1.5">' +
                (staff ? '<img src="' + staff.avatar + '" class="w-4 h-4 rounded-full" alt="">' : '<i data-lucide="briefcase" class="w-3.5 h-3.5"></i>') +
                (staff ? escapeHtml(staff.name) : 'Unassigned') +
              '</span>' +
              '<span class="flex items-center gap-1.5"><i data-lucide="calendar" class="w-3.5 h-3.5"></i> ' + window.formatRelative(task.scheduledDate) + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="flex items-center gap-3 shrink-0">' +
            window.renderStatusPill(task.status) +
          '</div>' +
        '</div>' +
        '<div class="mt-3 pt-3 border-t border-gray-100 flex justify-end">' +
          (isPending
            ? '<button class="complete-btn px-4 py-1.5 bg-brand text-white text-xs font-semibold rounded-lg hover:bg-brand/90 transition-colors brand-glow flex items-center gap-1.5" data-task-id="' + task.id + '"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Mark Complete</button>'
            : '<button class="px-4 py-1.5 bg-gray-100 text-gray-400 text-xs font-semibold rounded-lg flex items-center gap-1.5 opacity-50 cursor-not-allowed" disabled><i data-lucide="check-circle" class="w-3.5 h-3.5"></i> ' + (task.status === 'completed' ? 'Completed' : 'Missed') + '</button>') +
        '</div>';

      // Attach complete handler
      if (isPending) {
        var completeBtn = div.querySelector('.complete-btn');
        completeBtn.addEventListener('click', function () {
          pendingCompleteTaskId = parseInt(this.dataset.taskId, 10);
          openCompleteModal();
        });
      }

      return div;
    }

    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== MODAL ==========
    function openCompleteModal() {
      document.getElementById('complete-modal').style.display = 'flex';
    }

    function closeCompleteModal() {
      document.getElementById('complete-modal').style.display = 'none';
      pendingCompleteTaskId = null;
    }

    function setupModalConfirm() {
      document.getElementById('modal-confirm-complete').addEventListener('click', function () {
        if (!pendingCompleteTaskId) return;

        var date = document.getElementById('modal-complete-date').value;
        var notes = document.getElementById('modal-complete-notes').value;

        if (!date) {
          window.showToast('Please select a completion date', 'error');
          return;
        }

        window.completeTask(pendingCompleteTaskId, date, notes);
        closeCompleteModal();
        renderTasks();
      });
    }

    // Close modal on overlay click
    document.addEventListener('click', function (e) {
      var modal = document.getElementById('complete-modal');
      if (e.target === modal) {
        closeCompleteModal();
      }
    });
  </script>

  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
