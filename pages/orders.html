<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Orders - ServCRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <script src="../assets/js/sidebar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#1DB954', navy: '#0B1E3D', amber: '#F59E0B', danger: '#EF4444' },
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
<script>injectSidebar();</script>

  <div class="page-content">
    <header class="page-header">
      <div class="page-header-inner">
        <div class="flex items-center gap-2">
          <button onclick="toggleSidebar()" class="sidebar-toggle-btn" aria-label="Toggle menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <h1 class="page-title">Orders</h1>
        </div>
        <button onclick="openNewOrderModal()" class="btn btn-sm btn-primary">
          <i data-lucide="plus" class="w-4 h-4"></i> New Order
        </button>
      </div>
    </header>

    <div class="p-4 md:p-6 lg:p-8 max-w-5xl mx-auto">

      <!-- Filter Tabs -->
      <div class="flex flex-wrap gap-2 mb-4" id="order-tabs">
        <button class="order-tab-btn px-4 py-1.5 text-sm font-medium rounded-full transition-colors bg-brand text-white" data-tab="all">All</button>
        <button class="order-tab-btn px-4 py-1.5 text-sm font-medium rounded-full transition-colors text-gray-600 hover:bg-gray-100" data-tab="pending">Pending</button>
        <button class="order-tab-btn px-4 py-1.5 text-sm font-medium rounded-full transition-colors text-gray-600 hover:bg-gray-100" data-tab="assigned">Assigned</button>
        <button class="order-tab-btn px-4 py-1.5 text-sm font-medium rounded-full transition-colors text-gray-600 hover:bg-gray-100" data-tab="completed">Completed</button>
        <button class="order-tab-btn px-4 py-1.5 text-sm font-medium rounded-full transition-colors text-gray-600 hover:bg-gray-100" data-tab="cancelled">Cancelled</button>
      </div>

      <!-- Search -->
      <div class="relative mb-4">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
        <input type="text" id="order-search" placeholder="Search by customer name or problem..." class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand/40 focus:border-brand text-sm bg-white">
      </div>

      <!-- Orders Container -->
      <div id="orders-container" class="space-y-3"></div>
    </div>
  </div>

  <nav class="bottom-nav md:hidden">
    <a href="dashboard.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Dashboard</span>
    </a>
    <a href="customers.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="users" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Customers</span>
    </a>
    <a href="orders.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg min-w-0 flex-1 active">
      <i data-lucide="clipboard-list" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Orders</span>
    </a>
    <a href="tasks.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="check-square" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Tasks</span>
    </a>
    <button onclick="window.location.href='settings.html'" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="more-horizontal" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">More</span>
    </button>
  </nav>

  <!-- New Order Modal -->
  <div id="new-order-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-bold text-gray-900">New Order</h3>
        <button onclick="closeModal('new-order-modal')" class="text-gray-400 hover:text-gray-600 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label for="order-customer" class="block text-sm font-semibold text-gray-700 mb-1.5">Customer <span class="text-danger">*</span></label>
          <select id="order-customer" class="form-select"></select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Service For <span class="text-danger">*</span></label>
          <div id="order-service-chips" class="flex flex-wrap gap-2"></div>
        </div>
        <div>
          <label for="order-problem" class="block text-sm font-semibold text-gray-700 mb-1.5">Problem / Issue <span class="text-danger">*</span></label>
          <textarea id="order-problem" rows="3" class="form-textarea" placeholder="Describe the problem in detail..."></textarea>
        </div>
        <div>
          <label for="order-priority" class="block text-sm font-semibold text-gray-700 mb-1.5">Priority</label>
          <div class="flex gap-2">
            <button type="button" id="order-priority-normal" class="px-4 py-2 rounded-lg text-sm font-medium border-2 border-brand bg-brand text-white">Normal</button>
            <button type="button" id="order-priority-urgent" class="px-4 py-2 rounded-lg text-sm font-medium border-2 border-gray-200 text-gray-600 hover:border-danger/50">Urgent</button>
          </div>
        </div>
        <div>
          <label for="order-date" class="block text-sm font-semibold text-gray-700 mb-1.5">Preferred Date</label>
          <input type="date" id="order-date" class="form-input max-w-xs">
        </div>
        <div>
          <label for="order-notes" class="block text-sm font-semibold text-gray-700 mb-1.5">Notes</label>
          <textarea id="order-notes" rows="2" class="form-textarea" placeholder="Any additional notes..."></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeModal('new-order-modal')" class="flex-1 px-4 py-2.5 border border-gray-300 text-gray-700 text-sm font-semibold rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
          <button id="btn-save-order" class="flex-1 px-4 py-2.5 bg-brand text-white text-sm font-semibold rounded-lg hover:bg-brand/90 transition-colors brand-glow">Save Order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Assign Staff Modal -->
  <div id="assign-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-bold text-gray-900">Assign Staff</h3>
        <button onclick="closeModal('assign-modal')" class="text-gray-400 hover:text-gray-600 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="space-y-4">
        <input type="hidden" id="assign-order-id" value="">
        <div>
          <label for="assign-staff" class="block text-sm font-semibold text-gray-700 mb-1.5">Staff Member <span class="text-danger">*</span></label>
          <select id="assign-staff" class="form-select"></select>
        </div>
        <div>
          <label for="assign-date" class="block text-sm font-semibold text-gray-700 mb-1.5">Scheduled Date <span class="text-danger">*</span></label>
          <input type="date" id="assign-date" class="form-input max-w-xs">
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeModal('assign-modal')" class="flex-1 px-4 py-2.5 border border-gray-300 text-gray-700 text-sm font-semibold rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
          <button id="btn-assign-order" class="flex-1 px-4 py-2.5 bg-purple-600 text-white text-sm font-semibold rounded-lg hover:bg-purple-700 transition-colors">Assign</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Complete Order Modal -->
  <div id="complete-order-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-bold text-gray-900">Complete Order</h3>
        <button onclick="closeModal('complete-order-modal')" class="text-gray-400 hover:text-gray-600 transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="space-y-4">
        <input type="hidden" id="complete-order-id" value="">
        <div>
          <label for="complete-notes" class="block text-sm font-semibold text-gray-700 mb-1.5">Completion Notes</label>
          <textarea id="complete-notes" rows="3" class="form-textarea" placeholder="Notes about the completed work..."></textarea>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="complete-create-task" class="w-4 h-4 accent-brand rounded">
          <label for="complete-create-task" class="text-sm text-gray-600">Also create a Task record for this order</label>
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeModal('complete-order-modal')" class="flex-1 px-4 py-2.5 border border-gray-300 text-gray-700 text-sm font-semibold rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
          <button id="btn-confirm-complete" class="flex-1 px-4 py-2.5 bg-brand text-white text-sm font-semibold rounded-lg hover:bg-brand/90 transition-colors brand-glow">Confirm Complete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Cancel Order Modal -->
  <div id="cancel-modal" class="modal-overlay" style="display:none">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="w-12 h-12 rounded-full bg-danger/10 flex items-center justify-center mx-auto mb-4">
        <i data-lucide="alert-triangle" class="w-6 h-6 text-danger"></i>
      </div>
      <input type="hidden" id="cancel-order-id" value="">
      <h3 class="text-lg font-bold text-navy text-center mb-2">Cancel Order?</h3>
      <p class="text-sm text-gray-500 text-center mb-6">Are you sure you want to cancel this order? This action cannot be undone.</p>
      <div class="flex gap-3">
        <button onclick="closeModal('cancel-modal')" class="btn btn-md btn-secondary flex-1">Go Back</button>
        <button onclick="confirmCancelOrder()" class="btn btn-md btn-danger flex-1">Yes, Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // ========== STATE ==========
    var currentOrderTab = 'all';
    var selectedOrderService = null;

    // ========== INIT ==========
    document.addEventListener('DOMContentLoaded', function () {
      checkOrderFilter();
      setupOrderTabs();
      setupOrderSearch();
      populateOrderCustomers();
      populateOrderServiceChips();
      populateAssignStaff();
      setDefaultOrderDate();
      setupPriorityToggle();
      renderOrders();

      document.getElementById('btn-save-order').addEventListener('click', handleSaveOrder);
      document.getElementById('btn-assign-order').addEventListener('click', handleAssign);
      document.getElementById('btn-confirm-complete').addEventListener('click', handleComplete);

      // Prefill modal dates
      var now = new Date();
      var y = now.getFullYear();
      var m = String(now.getMonth() + 1).padStart(2, '0');
      var d = String(now.getDate()).padStart(2, '0');
      var dateStr = y + '-' + m + '-' + d;
      document.getElementById('order-date').value = dateStr;
      document.getElementById('assign-date').value = dateStr;

      lucide.createIcons();
    });

    // ========== ORDER FILTER FROM DASHBOARD ==========
    function checkOrderFilter() {
      try {
        var stored = localStorage.getItem('fscrm_order_filter');
        if (stored) {
          if (stored === 'pending' || stored === 'assigned' || stored === 'completed' || stored === 'cancelled') {
            currentOrderTab = stored;
          }
          localStorage.removeItem('fscrm_order_filter');
          updateOrderTabUI();
        }
      } catch(e) {}
    }

    // ========== TABS ==========
    function setupOrderTabs() {
      document.querySelectorAll('.order-tab-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          currentOrderTab = this.dataset.tab;
          updateOrderTabUI();
          renderOrders();
        });
      });
      updateOrderTabUI();
    }

    function updateOrderTabUI() {
      document.querySelectorAll('.order-tab-btn').forEach(function (btn) {
        if (btn.dataset.tab === currentOrderTab) {
          btn.className = 'order-tab-btn px-4 py-1.5 text-sm font-medium rounded-full transition-colors bg-brand text-white';
        } else {
          btn.className = 'order-tab-btn px-4 py-1.5 text-sm font-medium rounded-full transition-colors text-gray-600 hover:bg-gray-100';
        }
      });
    }

    // ========== SEARCH ==========
    function setupOrderSearch() {
      document.getElementById('order-search').addEventListener('input', function () {
        renderOrders();
      });
    }

    // ========== GET FILTERED ORDERS ==========
    function getFilteredOrders() {
      var allOrders = window.getOrders();

      var filtered;
      if (currentOrderTab === 'all') {
        filtered = allOrders;
      } else {
        filtered = allOrders.filter(function (o) { return o.status === currentOrderTab; });
      }

      var search = document.getElementById('order-search').value.toLowerCase().trim();
      if (search) {
        filtered = filtered.filter(function (o) {
          return o.customerName.toLowerCase().indexOf(search) >= 0 ||
                 o.problem.toLowerCase().indexOf(search) >= 0;
        });
      }

      filtered.sort(function (a, b) {
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      return filtered;
    }

    // ========== RENDER ==========
    function renderOrders() {
      var container = document.getElementById('orders-container');
      var orders = getFilteredOrders();
      container.innerHTML = '';

      if (orders.length === 0) {
        container.appendChild(createOrderEmptyState());
        return;
      }

      var today = window.todayISO ? window.todayISO() : new Date().toISOString().split('T')[0];

      orders.forEach(function (order) {
        container.appendChild(createOrderCard(order, today));
      });

      lucide.createIcons();
    }

    function createOrderEmptyState() {
      var div = document.createElement('div');
      div.className = 'empty-state';
      div.innerHTML =
        '<i data-lucide="clipboard-list"></i>' +
        '<p>No ' + currentOrderTab + ' orders found</p>' +
        '<p class="empty-sub">' + (currentOrderTab === 'all' ? 'Create a new order to get started.' : 'No orders with this status.') + '</p>';
      return div;
    }

    function getOrderStatusBadge(status) {
      var map = {
        pending: { cls: 'badge-order-pending', icon: 'clock', label: 'Pending' },
        assigned: { cls: 'badge-order-assigned', icon: 'user-check', label: 'Assigned' },
        completed: { cls: 'badge-order-completed', icon: 'check-circle', label: 'Completed' },
        cancelled: { cls: 'badge-order-cancelled', icon: 'x-circle', label: 'Cancelled' }
      };
      var cfg = map[status] || map.pending;
      return '<span class="badge ' + cfg.cls + '"><i data-lucide="' + cfg.icon + '" class="w-3 h-3"></i> ' + cfg.label + '</span>';
    }

    function getPriorityBadge(priority) {
      if (priority === 'urgent') {
        return '<span class="badge badge-priority-urgent"><i data-lucide="alert-triangle" class="w-3 h-3"></i> Urgent</span>';
      }
      return '<span class="badge badge-priority-normal">Normal</span>';
    }

    function createOrderCard(order, today) {
      var div = document.createElement('div');
      div.className = 'bg-white rounded-xl border border-gray-200 p-4 md:p-5 shadow-sm hover:shadow-md transition-shadow';

      var problemShort = order.problem.length > 60 ? order.problem.substring(0, 60) + '...' : order.problem;

      var actionHtml = '';
      if (order.status === 'pending') {
        actionHtml =
          '<button class="assign-btn px-3 py-1.5 bg-purple-600 text-white text-xs font-semibold rounded-lg hover:bg-purple-700 transition-colors flex items-center gap-1" data-order-id="' + order.id + '"><i data-lucide="user-plus" class="w-3.5 h-3.5"></i> Assign</button>' +
          '<button class="cancel-btn px-3 py-1.5 bg-gray-100 text-gray-600 text-xs font-semibold rounded-lg hover:bg-gray-200 transition-colors flex items-center gap-1" data-order-id="' + order.id + '"><i data-lucide="x" class="w-3.5 h-3.5"></i> Cancel</button>';
      } else if (order.status === 'assigned') {
        actionHtml =
          '<button class="complete-order-btn px-3 py-1.5 bg-brand text-white text-xs font-semibold rounded-lg hover:bg-brand/90 transition-colors flex items-center gap-1" data-order-id="' + order.id + '"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Complete</button>' +
          '<button class="cancel-btn px-3 py-1.5 bg-gray-100 text-gray-600 text-xs font-semibold rounded-lg hover:bg-gray-200 transition-colors flex items-center gap-1" data-order-id="' + order.id + '"><i data-lucide="x" class="w-3.5 h-3.5"></i> Cancel</button>';
      }

      div.innerHTML =
        '<div class="flex items-start justify-between gap-3">' +
          '<div class="flex-1 min-w-0">' +
            '<div class="flex items-center gap-2 flex-wrap">' +
              '<h3 class="font-semibold text-gray-900 text-sm">' + escapeHtml(order.customerName) + '</h3>' +
              '<span class="badge bg-brand/10 text-brand text-xs">' + escapeHtml(order.serviceFor) + '</span>' +
              getPriorityBadge(order.priority) +
            '</div>' +
            '<p class="text-sm text-gray-500 mt-1">' + escapeHtml(problemShort) + '</p>' +
            '<div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-2 text-xs text-gray-400">' +
              '<span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> ' + (order.scheduledDate ? window.formatDate(order.scheduledDate) : 'Not scheduled') + '</span>' +
              '<span class="flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i> ' + (order.assignedStaffName || 'Unassigned') + '</span>' +
              '<span class="flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> ' + window.formatRelative(order.createdAt) + '</span>' +
            '</div>' +
            (order.notes ? '<p class="text-xs text-gray-400 mt-1 italic">' + escapeHtml(order.notes) + '</p>' : '') +
          '</div>' +
          '<div class="flex flex-col items-end gap-2 shrink-0">' +
            getOrderStatusBadge(order.status) +
          '</div>' +
        '</div>' +
        '<div class="mt-3 pt-3 border-t border-gray-100 flex justify-end gap-2 flex-wrap">' +
          actionHtml +
        '</div>';

      // Attach event handlers
      var assignBtn = div.querySelector('.assign-btn');
      if (assignBtn) {
        assignBtn.addEventListener('click', function () {
          document.getElementById('assign-order-id').value = this.dataset.orderId;
          openModal('assign-modal');
        });
      }

      var completeBtn = div.querySelector('.complete-order-btn');
      if (completeBtn) {
        completeBtn.addEventListener('click', function () {
          document.getElementById('complete-order-id').value = this.dataset.orderId;
          document.getElementById('complete-create-task').checked = false;
          openModal('complete-order-modal');
        });
      }

      var cancelBtn = div.querySelector('.cancel-btn');
      if (cancelBtn) {
        cancelBtn.addEventListener('click', function () {
          document.getElementById('cancel-order-id').value = this.dataset.orderId;
          openModal('cancel-modal');
        });
      }

      return div;
    }

    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== MODALS ==========
    function openModal(id) {
      document.getElementById(id).style.display = 'flex';
    }

    function closeModal(id) {
      document.getElementById(id).style.display = 'none';
    }

    document.addEventListener('click', function (e) {
      ['new-order-modal', 'assign-modal', 'complete-order-modal', 'cancel-modal'].forEach(function (id) {
        var el = document.getElementById(id);
        if (e.target === el) closeModal(id);
      });
    });

    // ========== NEW ORDER MODAL ==========
    function openNewOrderModal() {
      selectedOrderService = null;
      populateOrderCustomers();
      populateOrderServiceChips();
      document.getElementById('order-problem').value = '';
      document.getElementById('order-notes').value = '';
      document.getElementById('order-priority-normal').click();
      openModal('new-order-modal');
    }

    function populateOrderCustomers() {
      var select = document.getElementById('order-customer');
      select.innerHTML = '';
      var customers = window.getCustomers();
      customers.forEach(function (c) {
        var opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        select.appendChild(opt);
      });
    }

    function populateOrderServiceChips() {
      var container = document.getElementById('order-service-chips');
      container.innerHTML = '';
      var types = window.getServiceTypes();
      types.forEach(function (type) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = type;
        btn.dataset.value = type;
        btn.className = 'px-3 py-1.5 rounded-xl border text-xs font-medium transition-colors border-gray-200 text-gray-600 hover:border-brand/50 hover:text-brand';
        btn.addEventListener('click', function () {
          container.querySelectorAll('button').forEach(function (b) {
            b.className = 'px-3 py-1.5 rounded-xl border text-xs font-medium transition-colors border-gray-200 text-gray-600 hover:border-brand/50 hover:text-brand';
          });
          this.className = 'px-3 py-1.5 rounded-xl border text-xs font-medium transition-colors border-brand bg-brand text-white';
          selectedOrderService = this.dataset.value;
        });
        container.appendChild(btn);
      });
    }

    function populateAssignStaff() {
      var select = document.getElementById('assign-staff');
      select.innerHTML = '';
      var staff = window.getStaff();
      staff.forEach(function (s) {
        var opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name;
        select.appendChild(opt);
      });
    }

    function setDefaultOrderDate() {
      var now = new Date();
      var y = now.getFullYear();
      var m = String(now.getMonth() + 1).padStart(2, '0');
      var d = String(now.getDate()).padStart(2, '0');
      document.getElementById('order-date').value = y + '-' + m + '-' + d;
    }

    function setupPriorityToggle() {
      var normalBtn = document.getElementById('order-priority-normal');
      var urgentBtn = document.getElementById('order-priority-urgent');

      function setPriority(active) {
        [normalBtn, urgentBtn].forEach(function (btn) {
          btn.className = 'px-4 py-2 rounded-lg text-sm font-medium border-2 transition-colors';
        });
        if (active === 'urgent') {
          urgentBtn.className = 'px-4 py-2 rounded-lg text-sm font-medium border-2 border-danger bg-danger/10 text-danger';
          normalBtn.className = 'px-4 py-2 rounded-lg text-sm font-medium border-2 border-gray-200 text-gray-600 hover:border-gray-300';
        } else {
          normalBtn.className = 'px-4 py-2 rounded-lg text-sm font-medium border-2 border-brand bg-brand text-white';
          urgentBtn.className = 'px-4 py-2 rounded-lg text-sm font-medium border-2 border-gray-200 text-gray-600 hover:border-danger/50';
        }
      }

      normalBtn.addEventListener('click', function () { setPriority('normal'); });
      urgentBtn.addEventListener('click', function () { setPriority('urgent'); });
      setPriority('normal');
    }

    function handleSaveOrder() {
      var customerSelect = document.getElementById('order-customer');
      var customerId = customerSelect.value;
      var customerName = customerSelect.options[customerSelect.selectedIndex].text;
      var problem = document.getElementById('order-problem').value.trim();
      var date = document.getElementById('order-date').value;
      var notes = document.getElementById('order-notes').value.trim();
      var isUrgent = document.getElementById('order-priority-urgent').classList.contains('border-danger');

      if (!customerId) {
        window.showToast('Please select a customer.', 'error');
        return;
      }
      if (!selectedOrderService) {
        window.showToast('Please select a service type.', 'error');
        return;
      }
      if (!problem) {
        window.showToast('Please describe the problem.', 'error');
        return;
      }

      var orderData = {
        customerId: parseInt(customerId, 10),
        customerName: customerName,
        serviceFor: selectedOrderService,
        problem: problem,
        status: 'pending',
        priority: isUrgent ? 'urgent' : 'normal',
        assignedTo: null,
        assignedStaffName: null,
        scheduledDate: date || null,
        notes: notes
      };

      var saved = window.createOrder(orderData);
      if (saved) {
        window.showToast('Order created successfully!', 'success');
        closeModal('new-order-modal');
        renderOrders();
      }
    }

    // ========== ASSIGN ==========
    function handleAssign() {
      var orderId = document.getElementById('assign-order-id').value;
      var staffId = document.getElementById('assign-staff').value;
      var staffName = document.getElementById('assign-staff').options[document.getElementById('assign-staff').selectedIndex].text;
      var date = document.getElementById('assign-date').value;

      if (!staffId) {
        window.showToast('Please select a staff member.', 'error');
        return;
      }
      if (!date) {
        window.showToast('Please select a scheduled date.', 'error');
        return;
      }

      var result = window.assignOrder(orderId, parseInt(staffId, 10), staffName, date);
      if (result) {
        window.showToast('Order assigned to ' + staffName, 'success');
        closeModal('assign-modal');
        renderOrders();
      }
    }

    // ========== COMPLETE ==========
    function handleComplete() {
      var orderId = document.getElementById('complete-order-id').value;
      var notes = document.getElementById('complete-notes').value.trim();
      var createTask = document.getElementById('complete-create-task').checked;

      var result = window.completeOrder(orderId, notes, createTask);
      if (result) {
        window.showToast('Order completed!' + (createTask ? ' Task created.' : ''), 'success');
        closeModal('complete-order-modal');
        renderOrders();
      }
    }

    // ========== CANCEL ==========
    function confirmCancelOrder() {
      var orderId = document.getElementById('cancel-order-id').value;
      var result = window.cancelOrder(orderId);
      if (result) {
        window.showToast('Order cancelled.', 'info');
        closeModal('cancel-modal');
        renderOrders();
      }
    }

  </script>

  <script src="../assets/js/app.js"></script>
