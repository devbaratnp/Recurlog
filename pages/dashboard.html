<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard - Recurlog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
  <script src="../assets/js/sidebar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#1DB954', navy: '#0B1E3D', amber: '#F59E0B', danger: '#EF4444' },
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    .dash-quick-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 14px 12px; min-height: 52px;
      background: var(--color-primary, #1DB954); color: #fff;
      border-radius: 12px; font-size: 14px; font-weight: 600;
      box-shadow: 0 4px 14px rgba(29,185,84,0.25); transition: all .15s ease;
    }
    .dash-quick-btn:hover { background: #17a449; }
    .dash-quick-btn:active { transform: scale(0.98); }
    .dash-card-cell { padding: 12px 8px; text-align: center; }
    .dash-card-cell.clickable { cursor: pointer; }
    .dash-card-cell.clickable:hover { background: #f9fafb; }
    .dash-col-top { font-size: 11px; font-weight: 500; color: #9ca3af; text-transform: uppercase; letter-spacing: .03em; line-height: 1.1; }
    .dash-col-sub { font-size: 11px; font-weight: 500; color: #9ca3af; line-height: 1.1; margin-bottom: 4px; min-height: 13px; }
    .dash-col-val { font-size: 20px; font-weight: 700; }
    .form-select-sm { width: auto; padding: 6px 28px 6px 10px; font-size: 13px; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
  <script>injectSidebar();</script>

  <div class="page-content" id="page-content">
    <header class="page-header">
      <div class="page-header-inner">
        <div class="flex items-center gap-2">
          <button onclick="toggleSidebar()" class="sidebar-toggle-btn" aria-label="Toggle menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <div class="flex items-center gap-2 md:hidden">
            <div class="w-7 h-7 bg-brand rounded-lg flex items-center justify-center">
              <i data-lucide="wrench" class="w-3.5 h-3.5 text-white"></i>
            </div>
            <span class="font-bold text-navy text-sm">Recurlog</span>
          </div>
          <div class="hidden md:flex items-center gap-2 text-sm text-gray-500">
            <i data-lucide="calendar" class="w-4 h-4"></i>
            <span id="current-date"></span>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button class="relative p-2 rounded-lg hover:bg-gray-100 transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center" aria-label="Notifications">
            <i data-lucide="bell" class="w-5 h-5 text-gray-500"></i>
            <span id="notification-badge" class="absolute top-0.5 right-0.5 bg-danger text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden"></span>
          </button>
        </div>
      </div>
    </header>

    <main class="p-4 md:p-6 max-w-5xl">
      <h1 class="text-xl font-bold text-navy mb-5">Dashboard &mdash; Overview</h1>

      <!-- Quick Add -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
        <button onclick="quickAdd('customer')" class="dash-quick-btn">
          <i data-lucide="plus" class="w-4 h-4"></i> Customer
        </button>
        <button onclick="quickAdd('order')" class="dash-quick-btn">
          <i data-lucide="plus" class="w-4 h-4"></i> Order
        </button>
        <button onclick="quickAdd('onetime')" class="dash-quick-btn">
          <i data-lucide="plus" class="w-4 h-4"></i> One Time Task
        </button>
        <button onclick="quickAdd('recurring')" class="dash-quick-btn">
          <i data-lucide="plus" class="w-4 h-4"></i> Recurring Task
        </button>
      </div>

      <!-- Report cards (rendered by script) -->
      <div id="dash-cards" class="space-y-5"></div>
    </main>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav md:hidden">
    <a href="dashboard.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg min-w-0 flex-1 active">
      <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Dashboard</span>
    </a>
    <a href="customers.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="users" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Customers</span>
    </a>
    <a href="orders.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="clipboard-list" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Orders</span>
    </a>
    <a href="tasks.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="check-square" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Tasks</span>
    </a>
    <button onclick="showMoreModal()" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="more-horizontal" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">More</span>
    </button>
  </nav>

  <div id="more-modal" class="modal-overlay hidden" onclick="hideMoreModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3 class="font-semibold text-navy text-lg mb-4">More</h3>
      <div class="space-y-1">
        <a href="staff.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors min-h-[44px]">
          <i data-lucide="briefcase" class="w-5 h-5 text-gray-400"></i> Staff
        </a>
        <a href="reports.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors min-h-[44px]">
          <i data-lucide="bar-chart-3" class="w-5 h-5 text-gray-400"></i> Reports
        </a>
        <a href="notifications.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors min-h-[44px]">
          <i data-lucide="bell" class="w-5 h-5 text-gray-400"></i> Notifications
        </a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors min-h-[44px]">
          <i data-lucide="settings" class="w-5 h-5 text-gray-400"></i> Settings
        </a>
        <hr class="my-2 border-gray-100">
        <button onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-danger hover:bg-red-50 transition-colors w-full min-h-[44px]">
          <i data-lucide="log-out" class="w-5 h-5"></i> Logout
        </button>
      </div>
    </div>
  </div>

    <script>
    function showMoreModal() {
      document.getElementById('more-modal').classList.remove('hidden');
      lucide.createIcons();
    }
    function hideMoreModal(e) {
      if (e.target === e.currentTarget) {
        document.getElementById('more-modal').classList.add('hidden');
      }
    }

    // ===== Quick Add =====
    function quickAdd(type) {
      if (type === 'customer') {
        window.location.href = 'customer-add.html';
      } else if (type === 'order') {
        try { localStorage.setItem('fscrm_new_order_type', 'one-time'); } catch (e) {}
        window.location.href = 'orders.html';
      } else if (type === 'onetime') {
        window.location.href = 'onetime-task.html';
      } else if (type === 'recurring') {
        window.location.href = 'recurring-task.html';
      }
    }

    // ===== Drill-down navigation =====
    function navTasks(type, status, label) {
      var f = { status: status, label: label };
      if (type) { f.type = type; f.value = null; }
      window.navigateWithFilter(f);
    }
    function navOrders(filter) {
      if (filter) { try { localStorage.setItem('fscrm_order_filter', filter); } catch (e) {} }
      window.location.href = 'orders.html';
    }

    // ===== Card rendering =====
    // A single column. `data` is an HTML attribute string (or '') describing the click target.
    function cell(top, sub, value, color, data) {
      var clickable = data ? ' clickable' : '';
      return '<div class="dash-card-cell' + clickable + '"' + (data || '') + '>' +
        '<p class="dash-col-top">' + top + '</p>' +
        '<p class="dash-col-sub">' + (sub || '&nbsp;') + '</p>' +
        '<p class="dash-col-val ' + color + '">' + value + '</p>' +
      '</div>';
    }

    // Build the 5 columns for a task-based card. `nav` describes how columns deep-link.
    function taskColumns(c, col1Sub, col3Top, nav) {
      // nav: { allHref, type, label }  (type undefined = all tasks)
      var t = nav.type;
      var lbl = nav.label;
      var allData = nav.allHref
        ? ' data-act="href" data-href="' + nav.allHref + '"'
        : ' data-act="tasks"' + (t ? ' data-type="' + t + '"' : '') + ' data-status="all" data-label="' + lbl + ' &mdash; All"';
      return '' +
        cell('All', col1Sub, c.all, 'text-navy', allData) +
        cell('Todays', 'Completed', c.todayCompleted, 'text-navy',
          ' data-act="tasks"' + (t ? ' data-type="' + t + '"' : '') + ' data-status="completed" data-label="' + lbl + ' &mdash; Completed Today"') +
        cell(col3Top, '', c.toDo, 'text-danger', '') +
        cell('Today', '', c.today, 'text-brand',
          ' data-act="tasks"' + (t ? ' data-type="' + t + '"' : '') + ' data-status="today" data-label="' + lbl + ' &mdash; Today"') +
        cell('Tomorrow', '', c.tomorrow, 'text-brand', '');
    }

    function orderColumns(c) {
      return '' +
        cell('All', 'Orders', c.all, 'text-navy', ' data-act="orders"') +
        cell('Todays', 'Completed', c.todayCompleted, 'text-navy', ' data-act="orders" data-filter="completed"') +
        cell('To Delivery', '', c.toDo, 'text-danger', ' data-act="orders" data-filter="assigned"') +
        cell('Today', '', c.today, 'text-brand', '') +
        cell('Tomorrow', '', c.tomorrow, 'text-brand', '');
    }

    function cardShell(title, headerExtra, columnsHtml, bodyId) {
      return '<div class="card overflow-hidden">' +
        '<div class="card-header flex items-center justify-between gap-2">' +
          '<h2 class="font-semibold text-navy">' + title + '</h2>' +
          (headerExtra || '') +
        '</div>' +
        '<div class="grid grid-cols-5 divide-x divide-gray-100"' + (bodyId ? ' id="' + bodyId + '"' : '') + '>' +
          columnsHtml +
        '</div>' +
      '</div>';
    }

    function renderDashboard() {
      var stats = window.getDashboardStats();
      var container = document.getElementById('dash-cards');
      var html = '';

      // 1. Customer
      html += cardShell('Customer', '',
        taskColumns(stats.customerCard, 'Customers', 'To Do', { allHref: 'customers.html', type: null, label: 'Tasks' }));

      // 2. Order
      html += cardShell('Order', '', orderColumns(stats.orderCard));

      // 3. One Time Task
      html += cardShell('One Time Task', '',
        taskColumns(stats.oneTimeCard, 'Tasks', 'To Do Task', { type: 'one-time', label: 'One-Time' }));

      // 4. Recurring Task
      html += cardShell('Recurring Task', '',
        taskColumns(stats.recurringCard, 'Tasks', 'To Do Task', { type: 'recurring', label: 'Recurring' }));

      // 5. Staff-Wise Report (selector)
      var staffOptions = stats.staffList.map(function (s) {
        return '<option value="' + s.id + '">' + s.name + '</option>';
      }).join('');
      var staffHeader =
        '<div class="flex items-center gap-2">' +
          '<select id="dash-staff-select" class="form-select form-select-sm">' +
            '<option value="">Select Staff</option>' + staffOptions +
          '</select>' +
          '<button onclick="addStaff()" class="btn btn-sm btn-secondary whitespace-nowrap">+ Add</button>' +
        '</div>';
      html += cardShell('Staff Wise Report', staffHeader,
        emptySelectorColumns('To Do Task'), 'staff-card-body');

      // 6. Area-Wise Report (selector)
      var areas = window.getLocalities ? window.getLocalities() : [];
      stats.areaList.forEach(function (a) { if (areas.indexOf(a) < 0) areas.push(a); });
      var areaOptions = areas.map(function (a) {
        return '<option value="' + a.replace(/"/g, '&quot;') + '">' + a + '</option>';
      }).join('');
      var areaHeader =
        '<div class="flex items-center gap-2">' +
          '<select id="dash-area-select" class="form-select form-select-sm">' +
            '<option value="">Select Area</option>' + areaOptions +
          '</select>' +
          '<button onclick="addArea()" class="btn btn-sm btn-secondary whitespace-nowrap">+ Add</button>' +
        '</div>';
      html += cardShell('Area Wise Report', areaHeader,
        emptySelectorColumns('To Do Task'), 'area-card-body');

      container.innerHTML = html;

      // Selector wiring
      var staffSelect = document.getElementById('dash-staff-select');
      staffSelect.addEventListener('change', function () {
        var body = document.getElementById('staff-card-body');
        if (!this.value) { body.innerHTML = emptySelectorColumns('To Do Task'); return; }
        var c = window.getStaffCardStats(this.value);
        var label = staffSelect.options[staffSelect.selectedIndex].text;
        body.innerHTML = taskColumns(c, 'Tasks', 'To Do Task', { type: 'staff', label: label });
        body.querySelectorAll('[data-act="tasks"]').forEach(function (el) { el.setAttribute('data-value', staffSelect.value); });
        lucide.createIcons();
      });

      var areaSelect = document.getElementById('dash-area-select');
      areaSelect.addEventListener('change', function () {
        var body = document.getElementById('area-card-body');
        if (!this.value) { body.innerHTML = emptySelectorColumns('To Do Task'); return; }
        var c = window.getAreaCardStats(this.value);
        body.innerHTML = taskColumns(c, 'Tasks', 'To Do Task', { type: 'area', label: this.value });
        body.querySelectorAll('[data-act="tasks"]').forEach(function (el) { el.setAttribute('data-value', areaSelect.value); });
        lucide.createIcons();
      });

      lucide.createIcons();
    }

    // Delegated click navigation — bound once to the persistent container.
    function bindCardClicks() {
      var container = document.getElementById('dash-cards');
      container.addEventListener('click', function (e) {
        var target = e.target.closest('[data-act]');
        if (!target) return;
        var act = target.getAttribute('data-act');
        if (act === 'href') {
          window.location.href = target.getAttribute('data-href');
        } else if (act === 'orders') {
          navOrders(target.getAttribute('data-filter'));
        } else if (act === 'tasks') {
          var f = { status: target.getAttribute('data-status'), label: target.getAttribute('data-label') };
          var type = target.getAttribute('data-type');
          if (type) { f.type = type; f.value = target.getAttribute('data-value') || null; }
          window.navigateWithFilter(f);
        }
      });
    }

    function emptySelectorColumns(col3) {
      return '' +
        cell('All', 'Tasks', '&ndash;', 'text-gray-300', '') +
        cell('Todays', 'Completed', '&ndash;', 'text-gray-300', '') +
        cell(col3, '', '&ndash;', 'text-gray-300', '') +
        cell('Today', '', '&ndash;', 'text-gray-300', '') +
        cell('Tomorrow', '', '&ndash;', 'text-gray-300', '');
    }

    function addStaff() {
      window.showToast('Staff management is coming soon (admin-only feature).', 'info');
    }

    function addArea() {
      var name = window.prompt('Enter a new area / locality name:');
      if (!name) return;
      name = name.trim();
      if (!name) return;
      window.addLocality(name);
      window.showToast('Area "' + name + '" added.', 'success');
      renderDashboard();
    }

    document.addEventListener('DOMContentLoaded', function () {
      var today = new Date();
      var dateStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
      var el = document.getElementById('current-date');
      if (el) el.textContent = dateStr;

      bindCardClicks();
      renderDashboard();

      // Notification badge
      var unread = window.getUnreadCount ? window.getUnreadCount() : 0;
      var badge = document.getElementById('notification-badge');
      if (badge) {
        if (unread > 0) {
          badge.textContent = unread > 9 ? '9+' : unread;
          badge.classList.remove('hidden');
        } else {
          badge.classList.add('hidden');
        }
      }

      lucide.createIcons();
    });
  </script>
  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
