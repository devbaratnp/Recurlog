<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Customers - Field Service CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { brand: '#1DB954', navy: '#0B1E3D', amber: '#F59E0B', danger: '#EF4444' }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css" />
  <script src="../assets/js/sidebar.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <script>injectSidebar();</script>

  <div class="page-content" id="page-content">
    <header class="page-header">
      <div class="page-header-inner">
        <div class="flex items-center gap-2">
          <button onclick="toggleSidebar()" class="sidebar-toggle-btn" aria-label="Toggle menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <h1 class="page-title">Customers</h1>
        </div>
        <a href="customer-add.html" class="btn btn-sm btn-primary hidden md:inline-flex">
          <i data-lucide="plus" class="w-4 h-4"></i> Add Customer
        </a>
      </div>
    </header>

    <main class="p-4 md:p-6 max-w-6xl">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">
        <div>
          <p class="text-gray-500 text-sm">Manage your customer accounts and service history</p>
        </div>
        <a href="customer-add.html" class="btn btn-md btn-primary md:hidden">
          <i data-lucide="plus" class="w-4 h-4"></i> Add Customer
        </a>
      </div>

      <div class="relative mb-4">
        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none"></i>
        <input type="text" id="customer-search" placeholder="Search customers by name&hellip;" class="form-input pl-12" />
      </div>

      <div class="card overflow-hidden">
        <div class="p-0">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Address</th>
                <th>Contact</th>
                <th>Services</th>
                <th class="text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="customer-table-body"></tbody>
          </table>
        </div>
        <div id="customer-empty-state" class="empty-state hidden">
          <i data-lucide="users"></i>
          <p>No customers found</p>
          <p class="empty-sub">Try adjusting your search or add a new customer.</p>
        </div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav md:hidden">
    <a href="dashboard.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Dashboard</span>
    </a>
    <a href="customers.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg min-w-0 flex-1 active">
      <i data-lucide="users" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Customers</span>
    </a>
    <a href="tasks.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="clipboard-list" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Tasks</span>
    </a>
    <a href="reports.html" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">Reports</span>
    </a>
    <button onclick="window.location.href='settings.html'" class="flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-lg text-gray-500 min-w-0 flex-1">
      <i data-lucide="more-horizontal" class="w-5 h-5"></i>
      <span class="text-[10px] font-medium truncate w-full text-center">More</span>
    </button>
  </nav>

  <script src="../assets/js/seed.js"></script>
  <script src="../assets/js/router.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    lucide.createIcons();

    (function() {
      var searchInput = document.getElementById('customer-search');
      var tbody = document.getElementById('customer-table-body');
      var emptyState = document.getElementById('customer-empty-state');
      var allCustomers = [];

      function getCategoryColor(service) {
        var map = {
          'RO': 'bg-emerald-100 text-emerald-700',
          'TV': 'bg-blue-100 text-blue-700',
          'Refrigerator': 'bg-cyan-100 text-cyan-700',
          'AC': 'bg-orange-100 text-orange-700',
          'Washing Machine': 'bg-purple-100 text-purple-700',
          'Other': 'bg-gray-100 text-gray-700'
        };
        return map[service] || 'bg-gray-100 text-gray-700';
      }

      function renderTable(filter) {
        var q = (filter || '').toLowerCase().trim();
        var filtered = q ? allCustomers.filter(function(c) { return c.name.toLowerCase().includes(q); }) : allCustomers;

        if (filtered.length === 0) {
          tbody.innerHTML = '';
          emptyState.classList.remove('hidden');
          return;
        }
        emptyState.classList.add('hidden');

        tbody.innerHTML = filtered.map(function(c) {
          var chips = (c.servicesFor || []).map(function(s) {
            return '<span class="badge ' + getCategoryColor(s).replace('bg-', 'bg-').replace('text-', 'text-') + '">' + s + '</span>';
          }).join(' ');

          return '<tr>' +
            '<td data-label="Name" class="font-medium text-gray-900">' + c.name + '</td>' +
            '<td data-label="Address" class="text-gray-600">' + c.address + '</td>' +
            '<td data-label="Contact" class="text-gray-600">' + c.phone + '</td>' +
            '<td data-label="Services"><div class="flex flex-wrap gap-1.5">' + chips + '</div></td>' +
            '<td data-label="" class="text-right">' +
              '<button onclick="goToCustomer(' + c.id + ')" class="btn btn-sm btn-primary">' +
                '<i data-lucide="eye" class="w-3.5 h-3.5"></i> View' +
              '</button>' +
            '</td>' +
          '</tr>';
        }).join('');

        try { lucide.createIcons(); } catch(e) {}
      }

      function loadCustomers() {
        allCustomers = window.getCustomers();
        renderTable('');
      }

      searchInput.addEventListener('input', function() {
        renderTable(this.value);
      });

      loadCustomers();
    })();
  </script>
</body>
</html>
