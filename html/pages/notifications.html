<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Notifications - Recurlog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css?v=20260601a">
  <script src="../assets/js/sidebar.js?v=20260601a"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#1DB954', navy: '#0B1E3D', amber: '#F59E0B', danger: '#EF4444' },
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">
  <script>injectSidebar();</script>

  <div class="page-content">
    <header class="page-header">
      <div class="page-header-inner">
        <div class="flex items-center gap-2">
          <button onclick="toggleSidebar()" class="sidebar-toggle-btn" aria-label="Toggle menu">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <h1 class="page-title">Notifications</h1>
          <span id="notification-badge" class="badge badge-info ml-1">0</span>
        </div>
        <button onclick="handleMarkAllRead()" class="btn btn-sm btn-ghost">
          <i data-lucide="check-check" class="w-4 h-4"></i> Mark All Read
        </button>
      </div>
    </header>

    <div class="p-4 sm:p-6">
      <div id="notifications-list" class="space-y-2"></div>
      <div id="notifications-empty" class="empty-state hidden">
        <i data-lucide="bell-off"></i>
        <p>No notifications yet</p>
      </div>
    </div>
  </div>

  <script>injectBottomNav();</script>

  <script>
    function getNotifIcon(type) {
      switch (type) {
        case 'task_completed': return { icon: 'check-circle', color: '#1DB954' };
        case 'task_missed': return { icon: 'alert-circle', color: '#EF4444' };
        case 'service_added': return { icon: 'plus-circle', color: '#0EA5E9' };
        case 'customer_added': return { icon: 'user-plus', color: '#1DB954' };
        case 'order_created': return { icon: 'clipboard-list', color: '#3B82F6' };
        case 'order_assigned': return { icon: 'user-check', color: '#8B5CF6' };
        case 'order_completed': return { icon: 'check-circle', color: '#22C55E' };
        default: return { icon: 'info', color: '#6B7280' };
      }
    }

    function renderNotifications() {
      var notifs = window.getNotifications();
      var list = document.getElementById('notifications-list');
      var empty = document.getElementById('notifications-empty');
      var badge = document.getElementById('notification-badge');
      var unread = window.getUnreadCount();

      badge.textContent = unread;
      badge.style.display = unread > 0 ? 'inline' : 'none';

      if (notifs.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      list.innerHTML = notifs.map(function(n) {
        var ico = getNotifIcon(n.type);
        var relativeTime = window.formatRelative(n.createdAt);
        return '<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-start gap-3 hover:shadow-md transition-all ' + (n.isRead ? '' : 'border-l-4 border-l-brand') + '">' +
          '<div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style="background:' + ico.color + '15">' +
            '<i data-lucide="' + ico.icon + '" class="w-5 h-5" style="color:' + ico.color + '"></i>' +
          '</div>' +
          '<div class="flex-1 min-w-0">' +
            '<p class="text-sm text-gray-700 leading-relaxed">' + n.text + '</p>' +
            '<p class="text-xs text-gray-400 mt-1">' + relativeTime + '</p>' +
          '</div>' +
          (!n.isRead ? '<span class="w-2 h-2 rounded-full bg-brand flex-shrink-0 mt-1.5"></span>' : '') +
        '</div>';
      }).join('');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function handleMarkAllRead() {
      window.markAllRead();
      renderNotifications();
      window.showToast('All notifications marked as read.', 'success');
    }

    document.addEventListener('DOMContentLoaded', function () {
      window.initApp(renderNotifications);
    });
  </script>
  <script src="../assets/js/seed.js?v=20260601a"></script>
  <script src="../assets/js/router.js?v=20260601a"></script>
  <script src="../assets/js/app.js?v=20260601a"></script>
  <script src="../assets/js/api.js?v=20260601a"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
