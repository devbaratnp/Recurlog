name: Deploy to Live Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync files via SFTP
        uses: lampvina/sftp-sync-action@v1.0.0
        with:
          host: ${{ secrets.SFTP_HOST || secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || '22' }}
          remoteDir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            .git*
            node_modules/**
            .env*
            AGENTS.md
