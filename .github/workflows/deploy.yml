name: Deploy to Live Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync via LFTP (SFTP)
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} \
              -p ${{ secrets.SFTP_PORT || '22' }} \
              sftp://${{ secrets.SFTP_HOST || secrets.FTP_HOST }}
            mirror -R \
              --exclude .git* --exclude node_modules/ --exclude .env* \
              --exclude AGENTS.md \
              --verbose \
              . ${{ secrets.FTP_SERVER_DIR }}
          "
